<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TTS Preview</title>
    <style>
        body {
            background: #0f0f1a;
            color: #00f5ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 245, 255, 0.3);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 245, 255, 0.1);
        }
        .status {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-bottom: 20px;
        }
        .msg {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        .pulse {
            width: 50px;
            height: 50px;
            background: #00f5ff;
            border-radius: 50%;
            margin-top: 30px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 245, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0, 245, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 245, 255, 0); }
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #00f5ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="status">Simulando Comando Moderador (!s)</div>
        <div class="msg" id="text">Moderador_Pro te avisa: ¡Oye, no olvides el sorteo de las 5!</div>
        <div class="pulse"></div>
        <button id="play">REPRODUCIR AUDIO</button>
    </div>

    <script>
        document.getElementById('play').onclick = () => {
            const text = document.getElementById('text').innerText;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
        };
    </script>
</body>
</html>
